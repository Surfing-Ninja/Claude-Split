# Render.com blueprint — deploys the Claude Split backend as a free web service.
# Dashboard → New + → Blueprint → select this repo. Render will prompt for
# DATABASE_URL (your Neon connection string) on first deploy.
services:
  - type: web
    name: claude-split
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false # your Neon connection string — entered in the dashboard, never committed
      - key: CORS_ORIGINS
        value: '' # optional extra web origins; extension origins are always allowed
      - key: TOKEN_TTL_DAYS
        value: '30'
      - key: RETENTION_DAYS
        value: '90'
